<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./Src/Css/Main.css">
    <title>Pesquisa Culturama</title>
</head>
<body>

    <header>
        <h1>Pesquisa Online</h1>
    </header>

    <section>
        <form action="" method="get">
            <fieldset>
                <legend>Dados Pessoais</legend>
   
                    <label for="Name">Nome</label>
                    <input type="text" name="userName" id="Name" required placeholder="Nome"><br>
                    
                    <label for="age">Idade</label>
                    <input name="Userage" type="number" id="age" min="12" max="100" required><br>

                    <label for="birthDate">Data de nascimento</label>
                    <input name="UserbirthDate" id="birthDate" type="date" required><br>

                    <label for="Email">Email</label>
                    <input name="userEmail" type="email" id="Email" required placeholder="nome@gmail.com"><br>

                    <label for="PhoneNumber">Telefone</label>
                    <input name="userPhoneNumber" type="tel" id="PhoneNumber" pattern="[0-9]{11}" placeholder="(ddd) xxxxx-xxxx"><br>

                    <label for="Image">Upload de foto</label>
                    <input type="file" accept="image/*" name="userImage" id="Image"><br>

            </fieldset>
            
            <fieldset>
                <legend>Perfil</legend>

                <p>Gênero:</p>
                <input id="generomasc" type="radio" name="mas" value="Masculino">
                <label for="generomasc">Masculino</label>

                <input id="generofem" type="radio" name="fem" value="Feminino">
                <label for="generofem">Feminino</label>

                <input id="nogender" type="radio" name="nogen" value="NotInformed">
                <label for="nogender">Prefiro não informar</label><br>
          
                <label for="maritalStatus">Estado civil:</label>
                <select id="maritalStatus" name="usermaritalStatus">
                    <option value="NotInformed">selecione...</option>
                    <option value="Casado">Casado</option>
                    <option value="Solteiro">Solteiro</option>
                    <option value="Divorciado">Divorciado</option>
                    <option value="Uniaoestavel">União estavel</option>
                </select>

                <label for="State">Estado:</label>
                <select id="State" name="userState" required>
                    <option selected>Escolher...</option>
                    <option value="AC">Acre</option>
                    <option value="AL">Alagoas</option>
                    <option value="AP">Amapá</option>
                    <option value="AM">Amazonas</option>
                    <option value="BA">Bahia</option>
                    <option value="CE">Ceará</option>
                    <option value="DF">Distrito Federal</option>
                    <option value="ES">Espírito Santo</option>
                    <option value="GO">Goías</option>
                    <option value="MA">Maranhão</option>
                    <option value="MT">Mato Grosso</option>
                    <option value="MS">Mato Grosso do Sul</option>
                    <option value="MG">Minas Gerais</option>
                    <option value="PA">Pará</option>
                    <option value="PB">Paraíba</option>
                    <option value="PR">Paraná</option>
                    <option value="PE">Pernambuco</option>
                    <option value="PI">Piauí</option>
                    <option value="RJ">Rio de Janeiro</option>
                    <option value="RN">Rio Grande do Norte</option>
                    <option value="RS">Rio Grande do Sul</option>
                    <option value="RO">Rondônia</option>
                    <option value="RR">Roraíma</option>
                    <option value="SC">Santa Catarina</option>
                    <option value="SP">São Paulo</option>
                    <option value="SE">Sergipe</option>
                    <option value="TO">Tocantins</option>
                </select>

                <label for="City">Cidade:</label>
                <input  id="City" type="text" name="userCity" placeholder="Ex: Fortaleza"  autocomplete="address-level2" required>
            </fieldset>

            <fieldset>
                <legend>Hábitos</legend>
                <label>Redes sociais: </label><br>
                        <input id="socialinsta" type="checkbox" name="Usersocial" value="instagram">
                <label for="socialinsta">Instagram</label><br>

                       <input id="socialface"  type="checkbox" name="Usersocial" value="facebook">
                <label for="socialface">facebook</label><br>

                       <input id="socialx" type="checkbox" name="Usersocial" value="X(twitter)">
                <label for="socialx">x(twitter)</label><br>

                       <input id="socialldn" type="checkbox" name="Usersocial" value="linkedin">
                <label for="socialldn">linkedin</label><br>

            </fieldset>

            <button type="submit">Enviar</button>

        </form>
    </section>
</body>
</html>
